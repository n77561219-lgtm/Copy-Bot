services:
  bot:
    build: .
    container_name: copy-bot
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./data:/app/data
    expose:
      - "8080"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.copybot.rule=Host(`bot.bizaineuro.ru`) && PathPrefix(`/yookassa/`)"
      - "traefik.http.routers.copybot.tls=true"
      - "traefik.http.routers.copybot.tls.certresolver=mytlschallenge"
      - "traefik.http.services.copybot.loadbalancer.server.port=8080"
    networks:
      - traefik_net

networks:
  traefik_net:
    external: true
    name: root_default
